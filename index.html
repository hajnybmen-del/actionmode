<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ACTION MODE | 21denní Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f1ec;--bg2:#ebe6df;--bg3:#e0dbd3;
  --card:#fff;--card2:#faf8f5;
  --text:#1a1715;--text2:#5a5550;--text3:#8a8580;
  --accent:#c41a1a;--accent2:#e02020;--accent-light:#fdf2f2;--accent-glow:rgba(196,26,26,0.15);
  --gold:#b8942e;--gold-light:#fdf8eb;
  --green:#1a8a3e;--green2:#15752f;--green-light:#edfbf2;
  --border:#ddd8d0;--border2:#ccc7bf;
  --paper:#fff;--ink:#1a1715;
  --radius:4px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow2:0 4px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Oswald',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

.app{max-width:540px;margin:0 auto;padding:0 14px 120px}

/* ===== HERO ===== */
.hero{position:relative;height:260px;margin:0 -14px;overflow:hidden;border-bottom:3px solid var(--accent)}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center}
.hero-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,6,0.15) 0%,rgba(10,8,6,0.65) 55%,rgba(10,8,6,0.92) 100%)}
.hero-content{position:absolute;bottom:20px;left:18px;right:18px;z-index:1}
.hero-badge{font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:#e53e3e;background:rgba(0,0,0,0.5);padding:2px 10px;display:inline-block;margin-bottom:8px;backdrop-filter:blur(4px)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:0.88;letter-spacing:-1px;color:#fff}
.hero h1 span{color:#e53e3e}
.hero-sub{font-family:'Courier Prime',monospace;font-size:0.55rem;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-top:4px}

/* ===== PROGRESS ===== */
.progress-section{padding:18px 0;margin-bottom:4px}
.progress-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.p-stat{text-align:center;padding:14px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.p-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}
.p-num.red{color:var(--accent)}.p-num.dark{color:var(--text)}.p-num.gr{color:var(--green)}
.p-lbl{font-family:'Courier Prime',monospace;font-size:0.45rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.bar-wrap{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.8s cubic-bezier(.4,0,.2,1)}
.bar-labels{display:flex;justify-content:space-between;margin-top:6px;font-family:'Courier Prime',monospace;font-size:0.5rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

/* ===== GOAL BAR ===== */
.goal-bar{display:flex;gap:6px;margin-bottom:16px}
.goal-pill{flex:1;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
.gp-icon{font-family:'Courier Prime',monospace;font-size:0.45rem;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.gp-icon.gold{color:var(--gold)}
.gp-text{font-size:0.78rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== CELEBRATION ===== */
.celebration{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px)}
.celebration.show{display:flex}
.celeb-inner{text-align:center;background:var(--card);padding:40px 32px;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:celebIn 0.5s cubic-bezier(.2,.8,.2,1.2);max-width:320px}
.celeb-icon{font-size:3.5rem;margin-bottom:12px;animation:celebPulse 1s ease infinite}
.celeb-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);letter-spacing:2px}
.celeb-sub{font-size:0.82rem;color:var(--text2);margin-top:6px;line-height:1.5}
.celeb-btn{margin-top:20px;padding:10px 32px;background:var(--accent);color:#fff;border:none;font-family:'Oswald',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);transition:all 0.15s}
.celeb-btn:hover{background:var(--accent2)}
@keyframes celebIn{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes celebPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.confetti-piece{position:fixed;z-index:9999;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== BEAST MODE ===== */
.beast{text-align:center;padding:24px;margin-bottom:16px;background:var(--accent-light);border:2px solid var(--accent);border-radius:var(--radius);display:none}
.beast.show{display:block;animation:beastGlow 3s ease infinite}
.beast h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);letter-spacing:3px}
.beast p{font-size:0.82rem;color:var(--text2);margin-top:4px}
@keyframes beastGlow{0%,100%{box-shadow:0 0 20px var(--accent-glow)}50%{box-shadow:0 0 40px var(--accent-glow)}}

/* ===== WEEK SECTION ===== */
.week-section{margin-bottom:16px}
.week-header{position:relative;height:160px;overflow:hidden;border-radius:6px 6px 0 0;cursor:pointer;transition:all 0.2s}
.week-header:hover{filter:brightness(1.03)}
.week-header.locked{filter:grayscale(0.6) brightness(0.7);cursor:default;border-radius:6px}
.wh-img{position:absolute;inset:0;background-size:cover;background-position:center}
.wh-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 0%,rgba(0,0,0,0.75) 100%)}
.wh-content{position:absolute;bottom:14px;left:16px;right:16px;z-index:1}
.wh-badge{font-family:'Courier Prime',monospace;font-size:0.45rem;letter-spacing:3px;text-transform:uppercase;color:#e53e3e}
.wh-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:#fff;line-height:1}
.wh-sub{font-size:0.7rem;color:rgba(255,255,255,0.6);margin-top:2px}
.wh-lock{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center}
.wh-lock-icon{font-size:2rem;opacity:0.7}
.wh-lock-text{font-family:'Courier Prime',monospace;font-size:0.55rem;letter-spacing:2px;color:rgba(255,255,255,0.5);margin-top:4px;text-transform:uppercase}
.wh-progress{position:absolute;bottom:0;left:0;height:3px;background:#e53e3e;transition:width 0.5s ease;z-index:2;border-radius:0 0 0 6px}

.week-body{overflow:hidden;transition:max-height 0.4s ease}
.week-body.closed{max-height:0}.week-body.open{max-height:6000px}

/* Video + Quote */
.week-media{background:var(--card);border:1px solid var(--border);border-top:none;padding:16px}
.video-slot{background:var(--bg2);border:1px solid var(--border);height:0;padding-bottom:56.25%;position:relative;margin-bottom:12px;overflow:hidden;border-radius:var(--radius)}
.video-slot iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3)}
.vp-icon{font-size:2.5rem;margin-bottom:6px;opacity:0.25}.vp-text{font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:2px;text-transform:uppercase}
.week-quote{font-family:'Courier Prime',monospace;font-size:0.72rem;color:var(--text2);line-height:1.6;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);border-left:3px solid var(--accent)}
.week-quote span{color:var(--accent);font-weight:700}

/* ===== DAY CARD ===== */
.day-card{background:var(--card);border:1px solid var(--border);border-top:none;transition:all 0.15s}
.day-card:last-child{border-radius:0 0 6px 6px}
.day-card.done{border-left:3px solid var(--green)}

.day-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background 0.1s}
.day-top:hover{background:var(--card2)}
.d-num{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--accent);width:28px;text-align:center;flex-shrink:0}
.day-card.done .d-num{color:var(--green)}
.d-info{flex:1;min-width:0}
.d-title{font-weight:600;font-size:0.82rem;color:var(--text);line-height:1.2}
.day-card.done .d-title{color:var(--green)}
.d-sub{font-size:0.65rem;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-check{width:22px;height:22px;border:2px solid var(--border2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.55rem;transition:all 0.15s}
.day-card.done .d-check{background:var(--green);border-color:var(--green);color:#fff}
.d-acts-mini{font-family:'Courier Prime',monospace;font-size:0.5rem;color:var(--text3);flex-shrink:0}

.day-expand{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.day-expand.open{max-height:600px}
.day-inner{padding:0 14px 14px;border-top:1px solid var(--border)}

.act-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg2);cursor:pointer;transition:opacity 0.1s}
.act-item:last-of-type{border-bottom:none}
.act-item:hover{opacity:0.8}
.act-box{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.5rem;transition:all 0.15s;background:var(--card2)}
.act-item.done .act-box{background:var(--green);border-color:var(--green);color:#fff}
.act-name{font-size:0.8rem;color:var(--text)}
.act-item.done .act-name{text-decoration:line-through;color:var(--text3)}

.micro-box{margin-top:10px;padding:10px 12px;background:var(--accent-light);border-left:2px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0}
.micro-box h4{font-family:'Courier Prime',monospace;font-size:0.45rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:3px}
.micro-box p{font-size:0.75rem;color:var(--text2);line-height:1.5}

.done-btn{width:100%;padding:10px;margin-top:10px;background:var(--green-light);border:1px solid var(--green);color:var(--green);font-family:'Oswald',sans-serif;font-weight:600;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border-radius:var(--radius)}
.done-btn:hover{background:var(--green);color:#fff}
.done-btn.is-done{background:var(--green);color:#fff;pointer-events:none}

/* ===== SETUP ===== */
.setup{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow2)}
.setup-hero{height:150px;position:relative;overflow:hidden}
.setup-hero img{width:100%;height:100%;object-fit:cover}
.setup-hero .sh-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--card) 100%)}
.setup-inner{padding:0 20px 24px}
.setup-tag{font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.setup h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:4px}
.setup-desc{font-size:0.78rem;color:var(--text2);margin-bottom:16px;line-height:1.5}
.s-label{font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:4px;margin-top:16px}
.s-label:first-of-type{margin-top:0}
.s-input{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px 12px;font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--text);outline:none;border-radius:var(--radius);transition:border 0.15s}
.s-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.s-input::placeholder{color:var(--text3)}
.s-input.error{border-color:var(--accent);background:var(--accent-light)}
.s-hint{font-size:0.68rem;color:var(--text3);margin-top:3px;line-height:1.4}
.s-hint em{color:var(--accent);font-style:normal}
.s-error{font-size:0.68rem;color:var(--accent);margin-top:3px;display:none}
.s-error.show{display:block}

.act-inputs{margin-top:4px}
.act-row{display:flex;gap:6px;margin-bottom:4px}
.act-row input{flex:1;background:var(--bg);border:1px solid var(--border);padding:8px 10px;font-family:'Oswald',sans-serif;font-size:0.82rem;color:var(--text);outline:none;border-radius:var(--radius)}
.act-row input:focus{border-color:var(--accent)}
.act-row input::placeholder{color:var(--text3)}
.act-row button{width:30px;background:var(--bg);border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);transition:all 0.1s}
.act-row button:hover{border-color:var(--accent);color:var(--accent)}
.add-btn{width:100%;padding:8px;background:var(--bg);border:1px dashed var(--border2);color:var(--text3);font-family:'Courier Prime',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);transition:all 0.15s;margin-top:4px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}

.examples-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:8px}
.examples-box h5{font-family:'Courier Prime',monospace;font-size:0.45rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.ex-chips{display:flex;flex-wrap:wrap;gap:4px}
.ex-chip{padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:0.68rem;color:var(--text2);cursor:pointer;transition:all 0.1s}
.ex-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

.go-btn{width:100%;padding:14px;margin-top:20px;background:var(--accent);color:#fff;border:none;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;cursor:pointer;border-radius:var(--radius);transition:all 0.15s}
.go-btn:hover{background:var(--accent2);box-shadow:0 4px 20px var(--accent-glow)}

/* Guide link */
.guide-link{display:block;text-align:center;margin-top:12px;font-family:'Courier Prime',monospace;font-size:0.55rem;letter-spacing:1px;color:var(--accent);text-decoration:none;text-transform:uppercase;transition:opacity 0.15s}
.guide-link:hover{opacity:0.7}

/* ===== RESET ===== */
.reset-area{text-align:center;padding:24px 0;margin-top:20px;border-top:1px solid var(--border)}
.reset-btn,.edit-btn{background:var(--card);border:1px solid var(--border);color:var(--text3);font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:2px;padding:6px 14px;cursor:pointer;text-transform:uppercase;border-radius:var(--radius);transition:all 0.15s}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.edit-btn{margin-right:8px}
.edit-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ===== COUNTDOWN TIMER ===== */
.countdown{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.cd-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;text-align:center;min-width:64px;box-shadow:var(--shadow)}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;color:var(--accent)}
.cd-label{font-family:'Courier Prime',monospace;font-size:0.4rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.cd-title{text-align:center;font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}

/* ===== QUOTE OF THE DAY ===== */
.qotd{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.qotd::after{content:'\201C';font-family:'Bebas Neue',sans-serif;font-size:6rem;color:var(--accent);opacity:0.06;position:absolute;top:-10px;right:10px;line-height:1}
.qotd-text{font-size:0.82rem;color:var(--text);line-height:1.55;font-style:italic;position:relative;z-index:1}
.qotd-label{font-family:'Courier Prime',monospace;font-size:0.4rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}

/* ===== BADGES ===== */
.badges-section{margin-bottom:16px}
.badges-title{font-family:'Courier Prime',monospace;font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.badges-grid{display:flex;flex-wrap:wrap;gap:6px}
.badge{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);transition:all 0.2s}
.badge.locked{opacity:0.35;filter:grayscale(1)}
.badge.earned{border-color:var(--gold);background:var(--gold-light);animation:badgeEarn 0.5s ease}
.badge-icon{font-size:0.9rem}
.badge-name{font-size:0.62rem;font-weight:600;color:var(--text2)}
.badge.earned .badge-name{color:var(--gold)}
@keyframes badgeEarn{0%{transform:scale(0.8)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* ===== TELEGRAM BUTTON ===== */
.tg-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;margin-bottom:16px;background:linear-gradient(135deg,#0088cc,#0077b5);color:#fff;border:none;border-radius:var(--radius);font-family:'Oswald',sans-serif;font-weight:600;font-size:0.82rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;text-decoration:none;box-shadow:0 2px 8px rgba(0,136,204,0.25)}
.tg-btn:hover{filter:brightness(1.1);box-shadow:0 4px 16px rgba(0,136,204,0.35);transform:translateY(-1px)}
.tg-btn svg{width:18px;height:18px;fill:#fff}

/* ===== FLOATING TELEGRAM ===== */
.tg-float{position:fixed;bottom:20px;right:20px;width:52px;height:52px;background:linear-gradient(135deg,#0088cc,#0077b5);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,136,204,0.4);cursor:pointer;transition:all 0.2s;z-index:100;text-decoration:none}
.tg-float:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(0,136,204,0.5)}
.tg-float svg{width:24px;height:24px;fill:#fff}
.tg-float .tg-pulse{position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(0,136,204,0.4);animation:tgPulse 2s ease infinite}
@keyframes tgPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}

</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="tg-float-wrap"></div>
<div class="celebration" id="celebration">
  <div class="celeb-inner">
    <div class="celeb-icon" id="celeb-icon"></div>
    <div class="celeb-title" id="celeb-title"></div>
    <div class="celeb-sub" id="celeb-sub"></div>
    <button class="celeb-btn" onclick="closeCeleb()">POKRAČOVAT</button>
  </div>
</div>

<script>
// ============================================================
// ⚙️  KONFIGURACE — uprav zde před spuštěním
// ============================================================
const CONFIG = {
  // Telegram skupina — nahraď skutečným pozváncím linkem
  TG_LINK: "https://t.me/actionmode21", // ✅ ověřeno

  // Datum společného startu výzvy — null = každý startuje individuálně
  // Příklad: new Date(2026, 3, 7) = 7. dubna 2026
  CHALLENGE_START: null,

  // YouTube embed URLs pro jednotlivé týdny (prázdný řetězec = video zatím není)
  WEEK1_VIDEO: "",  // např. "https://www.youtube.com/embed/VIDEO_ID"
  WEEK2_VIDEO: "",
  WEEK3_VIDEO: "",
};

function weekDone(wi){const w=WEEKS[wi];for(let d=w.days[0];d<=w.days[1];d++){if(!S.done[d])return false}return true}
function weekLastDayDone(wi){const w=WEEKS[wi];return !!S.done[w.days[1]]}
function weekPct(wi){const w=WEEKS[wi];let c=0,t=w.days[1]-w.days[0]+1;for(let d=w.days[0];d<=w.days[1];d++){if(S.done[d])c++}return c/t}
function weekUnlocked(wi){
  if(wi===0)return true;
  const prev=wi-1;
  // Must have completed last day of previous week AND at least 60%
  return weekLastDayDone(prev)&&weekPct(prev)>=0.6;
}
function weekFailed(wi){
  // Week is "failed" if last day is done but less than 60% completed
  const w=WEEKS[wi];
  if(!weekLastDayDone(wi))return false;
  return weekPct(wi)<0.6;
}
function weekProgress(wi){return Math.round(weekPct(wi)*100)}
function totalDone(){return Object.keys(S.done).length}
function streak(){let s=0;for(let i=1;i<=21;i++){if(S.done[i])s++;else break}return s}

// VALIDATION
function isGibberish(str){
  if(str.length<3)return true;
  // Check consonant clusters — gibberish tends to have long consonant runs
  const vowels=/[aeiouyáéíóúůýěô]/gi;
  const cleaned=str.toLowerCase().replace(/[^a-záčďéěíňóřšťúůýž]/g,'');
  if(cleaned.length<3)return false; // mostly numbers/symbols = probably ok (e.g. "5 km")
  const vowelCount=(cleaned.match(vowels)||[]).length;
  const ratio=vowelCount/cleaned.length;
  if(ratio<0.15&&cleaned.length>5)return true; // too few vowels
  // Check for repeated chars
  if(/(.){3,}/.test(cleaned))return true;
  // Check for too many consonants in a row (>5 for Czech which allows some clusters)
  const consonantRun=cleaned.replace(vowels,'_').split('_').filter(Boolean);
  if(consonantRun.some(r=>r.length>6))return true;
  return false;
}

function validateGoal(v){
  if(!v||v.trim().length<5)return "Cíl musí mít alespoň 5 znaků.";
  if(isGibberish(v))return "Tohle nevypadá jako reálný cíl. Zkus to prosím znovu.";
  return null;
}

function validateActivity(v){
  if(!v||v.trim().length<3)return false;
  if(isGibberish(v))return false;
  return true;
}

function renderWeek(w,wi){

  const days=DAYS.filter(d=>d.d>=w.days[0]&&d.d<=w.days[1]);
  let lockMsg='\uD83D\uDD12';
  let lockText='Splň předchozí týden (min. 60 %)';
  if(failed){lockMsg='⚠️';lockText=`Předchozí týden: ${prevProg} % — potřebuješ min. 60 %. Restartuj ho.`}
  let h=`<div class="week-section">
    <div class="week-header ${unlocked?'':'locked'}" onclick="${unlocked?`toggleWeek(${wi})`:''}">

      <div class="done-btn" style="background:var(--accent);color:#fff;border-color:var(--accent);text-align:center;cursor:pointer;pointer-events:auto" onclick="resetWeek(${wi-1})">RESTARTOVAT ${WEEKS[wi-1].n.toUpperCase()}</div>

function attachSetup(){
  const el=document.getElementById('act-inputs');if(!el)return;

}
function addAct(){collectActs();S.acts.push('');render()}
function removeAct(i){collectActs();S.acts.splice(i,1);if(S.acts.length<1)S.acts=[''];render()}
function collectActs(){const inps=document.querySelectorAll('.ai');if(inps.length)S.acts=Array.from(inps).map(x=>x.value)}
function fillGoal(v){const el=document.getElementById('inp-goal');if(el)el.value=v}
function addActFromChip(v){collectActs();if(!S.acts.some(a=>a===v)){const emptyIdx=S.acts.findIndex(a=>!a.trim());if(emptyIdx>=0)S.acts[emptyIdx]=v;else S.acts.push(v);render()}}

function saveSetup(){
  const g=document.getElementById('inp-goal').value.trim();
  const r=document.getElementById('inp-reward').value.trim();
  collectActs();
  const a=S.acts.map(x=>x.trim()).filter(Boolean);

  // Validate goal
  const goalErr=validateGoal(g);
  const errGoalEl=document.getElementById('err-goal');
  const errActsEl=document.getElementById('err-acts');
  if(goalErr){errGoalEl.textContent=goalErr;errGoalEl.classList.add('show');document.getElementById('inp-goal').classList.add('error');return}
  else{errGoalEl.classList.remove('show');document.getElementById('inp-goal').classList.remove('error')}

  // Validate activities
  const validActs=a.filter(x=>validateActivity(x));
  if(validActs.length<2){errActsEl.textContent="Přidej alespoň 2 smysluplné aktivity.";errActsEl.classList.add('show');return}
  else{errActsEl.classList.remove('show')}

  const invalidActs=a.filter(x=>!validateActivity(x));
  if(invalidActs.length>0){errActsEl.textContent="Některá aktivita nevypadá smysluplně. Zkontroluj je.";errActsEl.classList.add('show');return}

  S.goal=g;S.reward=r;S.acts=validActs;S.ok=true;S.openWeek=0;if(!S.startDate)S.startDate=new Date().toISOString();
  save();render();
}
function editSetup(){S.ok=false;save();render()}

function toggleWeek(wi){S.openWeek=S.openWeek===wi?-1:wi;S.openDay=null;save();render()}
function toggleDay(d){S.openDay=S.openDay===d?null:d;save();render()}
function toggleAct(day,i){if(!S.dayActs[day])S.dayActs[day]={};S.dayActs[day][i]=!S.dayActs[day][i];S.openDay=day;save();render()}

function completeDay(d){
  if(S.done[d])return;S.done[d]=Date.now();
  let ct='day';
  // Check if completing last day of a week
  if(d===7){
    if(weekUnlocked(1)){ct='week1';S.openWeek=1;}
    else{ct='weekfail';S.openWeek=0;}
  } else if(d===14){
    if(weekUnlocked(2)){ct='week2';S.openWeek=2;}
    else{ct='weekfail';S.openWeek=1;}
  } else if(d===21&&weekPct(2)>=0.6){ct='week3';}
  S.openDay=null;save();render();showCeleb(ct);
}

function showCeleb(t){
  const d=CELEB[t];
  document.getElementById('celeb-icon').textContent=d.icon;
  document.getElementById('celeb-title').textContent=d.title;
  document.getElementById('celeb-sub').textContent=d.sub;
  document.getElementById('celebration').classList.add('show');
  if(t!=='day')spawnConfetti();
}
function closeCeleb(){document.getElementById('celebration').classList.remove('show')}
function spawnConfetti(){
  const cols=['#c41a1a','#e02020','#b8942e','#1a8a3e','#333','#ff6b6b'];
  for(let i=0;i<50;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'0'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),6000)}
}
function resetWeek(wi){
  const w=WEEKS[wi];
  // Clear all days in this week
  for(let d=w.days[0];d<=w.days[1];d++){
    delete S.done[d];
    delete S.dayActs[d];
  }
  S.openWeek=wi;
  S.openDay=null;
  save();
  render();
  // Scroll to top of week
  setTimeout(()=>{
    const el=document.querySelector('.week-section');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}
function resetAll(){if(!confirm('Opravdu resetovat celou výzvu?'))return;localStorage.removeItem(STORAGE_KEY);load();render()}

  "Dnes nemusíš být perfektní. Musíš být lepší než včera. To stačí.",
  "Úspěch je nudný. Je to opakování základů s neúprosnou pravidelností.",
  "Neříkej 'nemám čas'. Řekni 'není to moje priorita'. Pak se rozhodni.",
  "Strach z nepohodlí tě stojí víc než to nepohodlí samotné.",
  "Nedělní generál plánuje. Pondělní voják plní. Buď obojí.",
  "21 dní. Žádné výmluvy. Na konci tohohle nejsi stejný člověk.",
];

// ===== BADGES DEFINITION =====
const BADGES=[
  {id:'start',icon:'🎯',name:'Startér',desc:'Splnil první den',check:()=>totalDone()>=1},
  {id:'streak3',icon:'🔥',name:'3 dny v řadě',desc:'Tři dny bez přerušení',check:()=>streak()>=3},
  {id:'week1',icon:'⚡',name:'Boot Camp',desc:'Splněný Týden 1',check:()=>weekDone(0)},
  {id:'streak7',icon:'💪',name:'7 dní v řadě',desc:'Celý týden bez přerušení',check:()=>streak()>=7},
  {id:'halfway',icon:'🏔️',name:'Půlka cesty',desc:'Splněno 11+ dní',check:()=>totalDone()>=11},
  {id:'week2',icon:'💀',name:'Válečný režim',desc:'Splněný Týden 2',check:()=>weekDone(1)},
  {id:'streak14',icon:'🗡️',name:'14 dní v řadě',desc:'Dva týdny bez přerušení',check:()=>streak()>=14},
  {id:'week3',icon:'👑',name:'Železná konzistence',desc:'Splněný Týden 3',check:()=>weekDone(2)},
  {id:'beast',icon:'🏆',name:'BEAST MODE',desc:'Všech 21 dní splněno',check:()=>totalDone()>=21},
];

function getQuoteOfDay(){
  const now=new Date();
  // Use day of year as index so it changes daily
  const start=new Date(now.getFullYear(),0,0);
  const dayOfYear=Math.floor((now-start)/86400000);
  return QUOTES[dayOfYear%QUOTES.length];
}

function renderCountdown(){
  const CHALLENGE_START = CONFIG.CHALLENGE_START;

  const startDate = CHALLENGE_START || (S.startDate ? new Date(S.startDate) : null);
  if(!startDate){return ''}
  const end=new Date(startDate.getTime()+21*86400000);
  const now=new Date();

  let inner='';
  // Before start
  if(CHALLENGE_START && now < CHALLENGE_START){
    const diff=CHALLENGE_START-now;
    const days=Math.floor(diff/86400000);
    const hours=Math.floor((diff%86400000)/3600000);
    const mins=Math.floor((diff%3600000)/60000);
    inner=`<div class="cd-title">Výzva startuje za</div>
    <div class="countdown">
      <div class="cd-block"><div class="cd-num">${String(days).padStart(2,'0')}</div><div class="cd-label">Dní</div></div>
      <div class="cd-block"><div class="cd-num">${String(hours).padStart(2,'0')}</div><div class="cd-label">Hodin</div></div>
      <div class="cd-block"><div class="cd-num">${String(mins).padStart(2,'0')}</div><div class="cd-label">Minut</div></div>
    </div>`;
  } else {
    const diff=end-now;
    if(diff<=0){inner=`<div class="cd-title" style="color:var(--green)">✓ Výzva dokončena!</div>`;}
    else{
      const days=Math.floor(diff/86400000);
      const hours=Math.floor((diff%86400000)/3600000);
      const mins=Math.floor((diff%3600000)/60000);
      inner=`<div class="cd-title">Do konce výzvy zbývá</div>
      <div class="countdown">
        <div class="cd-block"><div class="cd-num">${String(days).padStart(2,'0')}</div><div class="cd-label">Dní</div></div>
        <div class="cd-block"><div class="cd-num">${String(hours).padStart(2,'0')}</div><div class="cd-label">Hodin</div></div>
        <div class="cd-block"><div class="cd-num">${String(mins).padStart(2,'0')}</div><div class="cd-label">Minut</div></div>
      </div>`;
    }
  }
  return `<div id="cd-wrap">${inner}</div>`;
}

function renderBadges(){
  let h=`<div class="badges-section"><div class="badges-title">// Tvoje odznaky</div><div class="badges-grid">`;
  BADGES.forEach(b=>{
    const earned=b.check();
    h+=`<div class="badge ${earned?'earned':'locked'}" title="${b.desc}"><span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span></div>`;
  });
  h+=`</div></div>`;
  return h;
}

// Update countdown every minute — fix: target #cd-wrap, not its parent (#app)
setInterval(()=>{
  const wrap=document.getElementById('cd-wrap');
  if(wrap&&S.startDate){wrap.outerHTML=renderCountdown();}
},60000);

render();
